name: iOS Auto Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  LANG: "en_US.UTF-8"
  LC_ALL: "en_US.UTF-8"

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Flutter 准备依赖
        run: |
          flutter create . --platforms=ios
          flutter clean
          flutter pub get

      - name: 注入 Podfile 运行期拦截补丁 (破除 MLKit 冲突的终极方案)
        run: |
          cat << 'EOF' > prepend_patch.rb
          podfile_path = 'ios/Podfile'
          if File.exist?(podfile_path)
            original_content = File.read(podfile_path)
            
            # 利用 CocoaPods 原生 pre_install 钩子，在依赖解析的黄金窗口期进行强改
            patch_code = <<~'RUBY_PATCH'
              
              # === MLKit Version Conflict Fix Begin ===
              pre_install do |installer|
                puts "⚡️ [MLKit Patch] 进入 pre_install 黄金窗口，开始强行对齐依赖..."
                
                # 同时扫描本地软链接目录和全局缓存目录，双保险确保无死角
                search_patterns = [
                  File.expand_path('../.symlinks/plugins/**/*.podspec', __FILE__),
                  '/Users/runner/.pub-cache/**/*.podspec'
                ]
                
                search_patterns.each do |pattern|
                  Dir.glob(pattern).each do |path|
                    next unless File.exist?(path) && !File.directory?(path)
                    
                    content = File.read(path)
                    if content.include?("GoogleMLKit/BarcodeScanning")
                      puts "⚡️ [MLKit Patch] 成功拦截冲突源文件: #{path}"
                      
                      # 将各种顽固的旧版本号（如 ~> 6.0.0）强行抹平对齐到 ~> 7.0.0
                      new_content = content.gsub(/['"]GoogleMLKit\/BarcodeScanning['"]\s*,\s*['"][^'"]+['"]/, "'GoogleMLKit/BarcodeScanning', '~> 7.0.0'")
                      
                      if new_content != content
                        File.write(path, new_content)
                        puts "🎉 [MLKit Patch] 依赖已成功重写为 '~> 7.0.0'！"
                      end
                    end
                  end
                end
                puts "⚡️ [MLKit Patch] 预处理拦截阶段顺利结束。"
              end
              # === MLKit Version Conflict Fix End ===
            RUBY_PATCH
            
            unless original_content.include?("MLKit Version Conflict Fix")
              # 追加到 Podfile 尾部，确保不破坏前面的 Flutter 变量声明
              File.write(podfile_path, original_content + "\n" + patch_code)
              puts "🎉 成功将 pre_install 拦截补丁追加到 Podfile 底部！"
            end
          else
            puts "❌ 未找到 ios/Podfile，请检查基础目录结构"
          end
          EOF
          ruby prepend_patch.rb
          
      - name: 强注 iOS 16.0 Target 与免签补丁
        run: |
          cat << 'EOF' > patch_target.rb
          podfile_path = 'ios/Podfile'
          if File.exist?(podfile_path)
            content = File.read(podfile_path)
            if content.match?(/^\s*#?\s*platform :ios,/)
              content.gsub!(/^\s*#?\s*platform :ios,.*/, "platform :ios, '16.0'")
            else
              content = "platform :ios, '16.0'\n" + content
            end
            target_str = 'flutter_additional_ios_build_settings(target)'
            patch = <<~RUBY
              flutter_additional_ios_build_settings(target)
                  target.build_configurations.each do |config|
                    config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '16.0'
                    config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                    config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                    config.build_settings['CODE_SIGN_IDENTITY'] = ''
                    config.build_settings
