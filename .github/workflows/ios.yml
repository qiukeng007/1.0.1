name: iOS Auto Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  LANG: "en_US.UTF-8"
  LC_ALL: "en_US.UTF-8"

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Flutter 准备依赖
        run: |
          flutter clean
          flutter pub get

      - name: 🛠️ 暴力重建无暇版 Podfile (强锁 15.2 与免签)
        run: |
          echo "=== 正在全量覆写标准版 Podfile ==="
          rm -f ios/Podfile
          cat << 'EOF' > ios/Podfile
          platform :ios, '15.2'

          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first"
            end

            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}. Try deleting Generated.xcconfig, then run flutter pub get"
          end

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

          flutter_ios_podfile_setup

          target 'Runner' do
            use_frameworks!
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
            
            target 'RunnerTests' do
              inherit! :search_paths
            end
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.2'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
              end
            end
          end
          EOF
          echo "🎉 标准版 Podfile 已成功写入！"
          
          mkdir -p ios/Flutter
          echo "IPHONEOS_DEPLOYMENT_TARGET=15.2" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Generated.xcconfig

      - name: 🛠️ 物理硬修 .pub-cache 中的 DefaultCamera 源码补丁
        run: |
          find /Users/runner/.pub-cache/ -name "DefaultCamera.swift" 2>/dev/null | while read -r target_file; do
            if ! grep -q "extension AVCaptureSession" "$target_file"; then
              sudo chmod 664 "$target_file" || true
              echo -e "\nimport AVFoundation\nextension AVCaptureSession {\n    @objc public static let wasInterruptedNotification = NSNotification.Name.AVCaptureSessionWasInterrupted\n    @objc public static let runtimeErrorNotification = NSNotification.Name.AVCaptureSessionRuntimeError\n}" >> "$target_file"
            fi
          done

      - name: 强行剥离 macOS 隐藏属性
        run: sudo xattr -cr . || true

      - name: Build Standard iOS Payload
        run: |
          find ios -name "*.xcconfig" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 15.2/g' {} +
          
          set +e
          flutter build ios --release --no-codesign --verbose > xcode_build.log 2>&1
          if [ $? -ne 0 ]; then
            echo "❌ 编译遭遇硬伤！以下为最后 150 行原始上下文："
            tail -n 150 xcode_build.log
            exit 1
          fi

      - name: ⚡ 自动化组装 IPA 包
        run: |
          rm -rf final_zip
          mkdir -p final_zip/Payload
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            cp -r "$APP_PATH" final_zip/Payload/
            cd final_zip
            zip -r -y -q ready-to-sign.ipa Payload
          else
            echo "❌ 找不到 Runner.app"
            exit 1
          fi

      - name: Upload Configured Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: final_zip/ready-to-sign.ipa