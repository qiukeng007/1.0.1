name: iOS Auto Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  LANG: "en_US.UTF-8"
  LC_ALL: "en_US.UTF-8"

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Flutter 准备依赖
        run: |
          flutter create . --platforms=ios
          flutter clean
          flutter pub get

      - name: 注入 Podfile 运行时拦截补丁 (核心：暴力降级 MLKit 约束)
        run: |
          cat << 'EOF' > prepend_monkey_patch.rb
          podfile_path = 'ios/Podfile'
          if File.exist?(podfile_path)
            original_content = File.read(podfile_path)
            # 这里增加了对 google_mlkit_commons 的强制拦截，将其版本约束拉回 15.0
            monkey_patch_code = <<~'RUBY_PATCH'
              # === Plugin Deployment Target Monkey Patch ===
              if defined?(::Pod::Installer)
                pre_install do |installer|
                  installer.pod_targets.each do |target|
                    if target.name.include?('google_mlkit_commons')
                      target.platform.deployment_target = Pod::Version.new('15.0')
                    end
                  end
                end
              end
            RUBY_PATCH
            
            unless original_content.include?("Plugin Deployment Target Monkey Patch")
              File.write(podfile_path, monkey_patch_code + "\n" + original_content)
            end
          end
          EOF
          ruby prepend_monkey_patch.rb
          
      - name: 强注 iOS 15.0 Target 并拦截硬补 camera_avfoundation 源码
        run: |
          cat << 'EOF' > patch_target.rb
          podfile_path = 'ios/Podfile'
          if File.exist?(podfile_path)
            content = File.read(podfile_path)
            
            # 统一强制设为 15.0
            if content.match?(/^\s*#?\s*platform :ios,/)
              content.gsub!(/^\s*#?\s*platform :ios,.*/, "platform :ios, '15.0'")
            else
              content = "platform :ios, '15.0'\n" + content
            end
            
            # 确保全局 Build Settings 都是 15.0
            target_str = 'flutter_additional_ios_build_settings(target)'
            patch = <<~RUBY
              flutter_additional_ios_build_settings(target)
                  target.build_configurations.each do |config|
                    config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                  end
            RUBY
            
            if content.include?(target_str) && !content.include?('IPHONEOS_DEPLOYMENT_TARGET')
              content.gsub!(target_str, patch)
            end
            
            File.open(podfile_path, 'w') { |f| f.write(content) }
          end
          EOF
          ruby patch_target.rb
          
          # 强制更新所有 xcconfig，确保不留死角
          find ios -name "*.xcconfig" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 15.2/g' {} +

      - name: 🛠️ 物理硬修 .pub-cache 中的插件底层源码
        run: |
          find /Users/runner/.pub-cache/ -name "DefaultCamera.swift" 2>/dev/null | while read -r target_file; do
            if ! grep -q "extension AVCaptureSession" "$target_file"; then
              sudo chmod 664 "$target_file" || true
              echo -e "\nimport AVFoundation\nextension AVCaptureSession {\n    @objc public static let wasInterruptedNotification = NSNotification.Name.AVCaptureSessionWasInterrupted\n    @objc public static let runtimeErrorNotification = NSNotification.Name.AVCaptureSessionRuntimeError\n}" >> "$target_file"
            fi
          done

      - name: Build Standard iOS Payload
        run: |
          flutter build ios --release --no-codesign --verbose

      - name: ⚡ 自动化组装 IPA 包
        run: |
          mkdir -p final_zip/Payload
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -n 1)
          cp -r "$APP_PATH" final_zip/Payload/
          cd final_zip && zip -r -y -q ready-to-sign.ipa Payload

      - name: Upload Configured Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: final_zip/ready-to-sign.ipa
