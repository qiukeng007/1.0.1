name: iOS Auto Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Flutter 准备依赖
        run: |
          flutter create . --platforms=ios
          flutter clean
          flutter pub get

      - name: 🛠️ 暴力降级插件 .podspec 版本约束
        run: |
          echo "=== 开始地毯式搜索并重写所有 .podspec 的部署目标 ==="
          # 遍历所有插件的 podspec，强制将平台版本改为 15.0
          find /Users/runner/.pub-cache/ -name "*.podspec" -exec sed -i '' "s/s.platform = :ios, .*/s.platform = :ios, '15.0'/g" {} +
          echo "🎉 所有插件的 iOS 版本要求已降级至 15.0"

      - name: 注入 Podfile 强行降级补丁
        run: |
          cat << 'EOF' > patch_podfile.rb
          podfile_path = 'ios/Podfile'
          if File.exist?(podfile_path)
            content = File.read(podfile_path)
            # 1. 强制设定 Podfile 的平台
            new_content = "platform :ios, '15.0'\n" + content.gsub(/^platform :ios, .*/, '')
            
            # 2. 注入针对所有 target 的 Build Settings 补丁
            patch = <<~RUBY
              post_install do |installer|
                installer.pods_project.targets.each do |target|
                  target.build_configurations.each do |config|
                    config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                  end
                end
              end
            RUBY
            
            # 如果已有 post_install，则合并；如果没有则追加
            if new_content.include?('post_install')
               new_content.gsub!(/post_install do \|installer\|/, "post_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'\n    end\n  end")
            else
               new_content += "\n" + patch
            end
            
            File.write(podfile_path, new_content)
          end
          EOF
          ruby patch_podfile.rb

      - name: 🛠️ 物理硬修 .pub-cache 中的 DefaultCamera 源码补丁
        run: |
          find /Users/runner/.pub-cache/ -name "DefaultCamera.swift" 2>/dev/null | while read -r target_file; do
            if ! grep -q "extension AVCaptureSession" "$target_file"; then
              sudo chmod 664 "$target_file" || true
              echo -e "\nimport AVFoundation\nextension AVCaptureSession {\n    @objc public static let wasInterruptedNotification = NSNotification.Name.AVCaptureSessionWasInterrupted\n    @objc public static let runtimeErrorNotification = NSNotification.Name.AVCaptureSessionRuntimeError\n}" >> "$target_file"
            fi
          done

      - name: Build Standard iOS Payload
        run: |
          # 再次确保所有 xcconfig 统一
          find ios -name "*.xcconfig" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} +
          flutter build ios --release --no-codesign --verbose

      - name: ⚡ 自动化组装 IPA 包
        run: |
          mkdir -p final_zip/Payload
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -n 1)
          if [ -d "$APP_PATH" ]; then
            cp -r "$APP_PATH" final_zip/Payload/
            cd final_zip && zip -r -y -q ready-to-sign.ipa Payload
          else
            echo "找不到 Runner.app，构建失败"
            exit 1
          fi

      - name: Upload Configured Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: final_zip/ready-to-sign.ipa
