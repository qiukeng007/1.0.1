name: iOS Auto Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  LANG: "en_US.UTF-8"
  LC_ALL: "en_US.UTF-8"

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Flutter 准备依赖
        run: |
          flutter create . --platforms=ios
          flutter clean
          flutter pub get

      - name: 注入 Podfile 运行时内存劫持补丁 (零污染终极方案)
        run: |
          cat << 'EOF' > prepend_monkey_patch.rb
          podfile_path = 'ios/Podfile'
          if File.exist?(podfile_path)
            original_content = File.read(podfile_path)
            
            # 使用 class_eval 替代传统的 module/class 嵌套，防止破坏 CocoaPods 内部常量的词法域
            monkey_patch_code = <<~'RUBY_PATCH'
              # === MLKit Dependency Core Monkey Patch Begin ===
              if defined?(::Pod::Dependency)
                ::Pod::Dependency.class_eval do
                  unless method_defined?(:original_initialize_mlkit)
                    alias_method :original_initialize_mlkit, :initialize
                    def initialize(*args, &block)
                      # 强制拦截对 BarcodeScanning 的解析，并把它的版本依赖无伤拉高对齐到 ~> 7.0.0
                      if args[0].to_s.include?('GoogleMLKit/BarcodeScanning')
                        args[1] = '~> 7.0.0'
                        args = args[0..1] # 剔除可能带有冲突的旧边界条件
                      end
                      original_initialize_mlkit(*args, &block)
                    end
                  end
                end
              end
              # === MLKit Dependency Core Monkey Patch End ===
            RUBY_PATCH
            
            # 必须前置合并，死死把守住 Podfile 第一行解析入口
            unless original_content.include?("MLKit Dependency Core Monkey Patch")
              File.write(podfile_path, monkey_patch_code + "\n" + original_content)
              puts "🎉 零污染内存补丁已安全无缝打入 Podfile 最顶端！"
            end
          else
            puts "❌ 未找到 ios/Podfile"
          end
          EOF
          ruby prepend_monkey_patch.rb
          
      - name: 强注 iOS 16.0 Target 与免签补丁
        run: |
          cat << 'EOF' > patch_target.rb
          podfile_path = 'ios/Podfile'
          if File.exist?(podfile_path)
            content = File.read(podfile_path)
            if content.match?(/^\s*#?\s*platform :ios,/)
              content.gsub!(/^\s*#?\s*platform :ios,.*/, "platform :ios, '16.0'")
            else
              content = "platform :ios, '16.0'\n" + content
            end
            target_str = 'flutter_additional_ios_build_settings(target)'
            patch = <<~RUBY
              flutter_additional_ios_build_settings(target)
                  target.build_configurations.each do |config|
                    config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '16.0'
                    config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                    config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                    config.build_settings['CODE_SIGN_IDENTITY'] = ''
                    config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
                  end
            RUBY
            if content.include?(target_str) && !content.include?('IPHONEOS_DEPLOYMENT_TARGET')
              content.gsub!(target_str, patch)
            end
            File.open(podfile_path, 'w') { |f| f.write(content) }
            puts 'Podfile 编译配置加固完成！'
          end
          EOF
          ruby patch_target.rb
          
          mkdir -p ios/Flutter
          echo "IPHONEOS_DEPLOYMENT_TARGET=16.0" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Generated.xcconfig
          
          echo "IPHONEOS_DEPLOYMENT_TARGET=16.0" >> ios/Flutter/FlutterRelease.xcconfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/FlutterRelease.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/FlutterRelease.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/FlutterRelease.xcconfig

      - name: 强行剥离 macOS 隐藏属性
        run: |
          echo "=== 正在使用最高权限递归清理 FinderInfo / provenance 属性 ==="
          sudo xattr -cr . || true

      - name: Build Standard iOS Payload
        run: |
          echo "=== 开始执行 Xcode iOS 16.0 强化编译 ==="
          
          set +e
          flutter build ios --release --no-codesign --verbose > xcode_build.log 2>&1
          BUILD_STATUS=$?
          set -e
          
          if [ $BUILD_STATUS -ne 0 ] || [ ! -d "build/ios/iphoneos/Runner.app" ]; then
            echo "❌ 编译遭遇硬伤！以下为最后 150 行原始上下文："
            echo "----------------------------------------"
            tail -n 150 xcode_build.log
            echo "----------------------------------------"
            exit 1
          else
            echo "🎉 真正的全线编译成功！内容完整！"
          fi
        
      - name: Zip Runner App
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            rm -rf final_zip
            mkdir -p final_zip/Payload
            cp -r build/ios/iphoneos/Runner.app final_zip/Payload/
            cd final_zip
            zip -r -y -q ready-to-sign.ipa Payload
            echo "🎉 IPA 免签打包成功！"
          else
            echo "❌ 错误：构建产物未生成"
            exit 1
          fi
          
      - name: Upload Configured Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: final_zip/ready-to-sign.ipa
