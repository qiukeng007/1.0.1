name: iOS Auto Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  LANG: "en_US.UTF-8"
  LC_ALL: "en_US.UTF-8"

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Flutter 准备依赖
        run: |
          flutter create . --platforms=ios
          flutter clean
          flutter pub get

      - name: ☢️ 终极物理篡改所有插件的 iOS 版本底线
        run: |
          cat << 'EOF' > patch_podspecs.rb
          require 'fileutils'
          
          # 定位 Flutter 插件的全局缓存目录
          cache_dir = File.expand_path('~/.pub-cache/hosted/pub.dev')
          podspecs = Dir.glob("#{cache_dir}/**/*.podspec")
          
          puts "🔍 正在扫描 #{podspecs.length} 个 podspec 配置文件..."
          
          patched_count = 0
          podspecs.each do |file|
            content = File.read(file)
            modified = false
            
            # 使用精准的 Ruby 块级正则替换，无视原有版本号，强行写入 15.0
            if content.match?(/s\.platform\s*=\s*:ios/)
              content.gsub!(/(s\.platform\s*=\s*:ios\s*,\s*['"])(.*?)(['"])/) { "#{$1}15.0#{$3}" }
              modified = true
            end
            
            if content.match?(/s\.ios\.deployment_target/)
              content.gsub!(/(s\.ios\.deployment_target\s*=\s*['"])(.*?)(['"])/) { "#{$1}15.0#{$3}" }
              modified = true
            end
            
            if modified
              File.write(file, content)
              puts "✅ 已强行降级: #{file.split('/').last}"
              patched_count += 1
            end
          end
          puts "🎉 核弹级降级完毕，共重写了 #{patched_count} 个插件依赖！"
          EOF
          ruby patch_podspecs.rb

      - name: 注入 Podfile 强行降级补丁
        run: |
          cat << 'EOF' > patch_podfile.rb
          podfile_path = 'ios/Podfile'
          if File.exist?(podfile_path)
            content = File.read(podfile_path)
            new_content = "platform :ios, '15.0'\n" + content.gsub(/^\s*#?\s*platform :ios, .*/, '')
            
            patch = <<~RUBY
              post_install do |installer|
                installer.pods_project.targets.each do |target|
                  target.build_configurations.each do |config|
                    config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                    config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                    config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                    config.build_settings['CODE_SIGN_IDENTITY'] = ''
                  end
                end
              end
            RUBY
            
            if new_content.include?('post_install do |installer|')
               new_content.gsub!(/post_install do \|installer\|/, "post_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'\n      config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'\n      config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'\n      config.build_settings['CODE_SIGN_IDENTITY'] = ''\n    end\n  end")
            else
               new_content += "\n" + patch
            end
            
            File.write(podfile_path, new_content)
          end
          EOF
          ruby patch_podfile.rb
          
          mkdir -p ios/Flutter
          echo "IPHONEOS_DEPLOYMENT_TARGET=15.0" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Generated.xcconfig

      - name: 🛠️ 物理硬修 .pub-cache 中的 DefaultCamera 源码补丁
        run: |
          find /Users/runner/.pub-cache/ -name "DefaultCamera.swift" 2>/dev/null | while read -r target_file; do
            if ! grep -q "extension AVCaptureSession" "$target_file"; then
              sudo chmod 664 "$target_file" || true
              echo -e "\nimport AVFoundation\nextension AVCaptureSession {\n    @objc public static let wasInterruptedNotification = NSNotification.Name.AVCaptureSessionWasInterrupted\n    @objc public static let runtimeErrorNotification = NSNotification.Name.AVCaptureSessionRuntimeError\n}" >> "$target_file"
            fi
          done

      - name: 强行剥离 macOS 隐藏属性
        run: sudo xattr -cr . || true

      - name: Build Standard iOS Payload
        run: |
          # 确保全局 xcconfig 没有漏网之鱼
          find ios -name "*.xcconfig" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} +
          
          set +e
          flutter build ios --release --no-codesign --verbose > xcode_build.log 2>&1
          if [ $? -ne 0 ]; then
            echo "❌ 编译遭遇硬伤！以下为最后 150 行原始上下文："
            tail -n 150 xcode_build.log
            exit 1
          fi

      - name: ⚡ 自动化组装 IPA 包
        run: |
          rm -rf final_zip
          mkdir -p final_zip/Payload
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            cp -r "$APP_PATH" final_zip/Payload/
            cd final_zip
            zip -r -y -q ready-to-sign.ipa Payload
          else
            echo "❌ 找不到 Runner.app"
            exit 1
          fi

      - name: Upload Configured Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: final_zip/ready-to-sign.ipa
